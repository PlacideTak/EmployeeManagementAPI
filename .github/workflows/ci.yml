name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3   # Récupère ton code depuis GitHub

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore EmployeeManagementAPI.sln

    - name: Build
      run: dotnet build EmployeeManagementAPI.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test EmployeeManagementAPI.sln --no-build --verbosity normal