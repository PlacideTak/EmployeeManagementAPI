name: .NET CI - Multi-project

# Déclenche le pipeline à chaque push ou pull request sur la branche main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest   # GitHub Actions va utiliser un serveur Linux

    steps:
      # 1️⃣ Récupérer le code depuis GitHub
      - uses: actions/checkout@v3

      # 2️⃣ Installer .NET 8 sur le serveur
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 3️⃣ Restaurer les dépendances NuGet pour toute la solution
      - name: Restore dependencies
        run: dotnet restore EmployeeManagementAPI.sln

      # 4️⃣ Build de tous les projets de la solution
      - name: Build
        run: dotnet build EmployeeManagementAPI.sln --configuration Release --no-restore

      # 5️⃣ Exécuter tous les tests unitaires (EmployeeManagement.Tests)
      - name: Run tests
        run: dotnet test EmployeeManagementAPI/EmployeeManagement.Tests.csproj --no-build --verbosity normal