name: EmployeeManagementAPI CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 3. Restore dependencies
    - name: Restore dependencies
      run: dotnet restore

    # 4. Build project
    - name: Build
      run: dotnet build --configuration Release --no-restore

    # 5. Run tests (si tu en as)
    - name: Test
       run: dotnet test EmployeeManagementAPI.sln --configuration Release --no-build --logger "trx"

    # 6. Docker build
    - name: Build Docker image
      run: docker build -t employeemanagementapi:latest .

    # 7. Login Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 8. Tag image
    - name: Tag Docker image
      run: docker tag employeemanagementapi:latest ${{ secrets.DOCKER_USERNAME }}/employeemanagementapi:latest

    # 9. Push image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/employeemanagementapi:latest